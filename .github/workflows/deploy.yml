name: Deploy to apollo.youschool.fr

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          use_insecure_cipher: true
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          script: |
            cd /home/youschool-apollo/htdocs/apollo.youschool.fr
            git fetch origin main
            git reset --hard origin/main
            rsync -a --delete \
              --exclude='.git' \
              /home/youschool-apollo/htdocs/apollo.youschool.fr/ \
              /home/mounir/htdocs/apollo.youschool.fr/
