name: Deploy to apollo.youschool.fr

on:
  push:
    branches:
      - main
      - stable

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          fingerprint: "51:ae:b8:fb:34:6e:34:73:5d:e1:a8:6e:0b:d8:aa:78"
          script: |
            cd /home/youschool-apollo/htdocs/apollo.youschool.fr
            git pull origin stable
